<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DollhouseDev</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%A0%3C/text%3E%3C/svg%3E" />
    <script>
      // Restore path encoded by 404.html after a GitHub Pages SPA redirect.
      (function () {
        var p = new URLSearchParams(window.location.search).get("p");
        if (p) {
          var h = new URLSearchParams(window.location.search).get("h");
          window.history.replaceState(
            null,
            "",
            "/" + decodeURIComponent(p) + (h ? "#" + decodeURIComponent(h) : ""),
          );
        }
      })();
    </script>
  </head>
  <body class="bg-black text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
